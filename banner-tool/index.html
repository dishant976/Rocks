<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockateral • X Banner Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; }
        .x-banner {
            width: 1500px; height: 500px;
            position: relative; overflow: hidden;
            border: 8px solid #00ff9d;
            box-shadow: 0 0 0 8px #000;
        }
        .stat-pill { background: rgba(0,0,0,0.6); border: 3px solid #00ff9d; }
        .texture-btn { transition: all 0.2s; }
        .texture-btn.active { border-color: #00ff9d; box-shadow: 0 0 0 3px #00ff9d; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold mb-8">ROCKATERAL • X Banner Generator</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Live Stats -->
            <div class="bg-zinc-900 p-6 rounded-3xl">
                <h2 class="text-xl mb-4">Live Collection Stats</h2>
                <div id="stats-grid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- Wallet Personalization -->
            <div class="bg-zinc-900 p-6 rounded-3xl">
                <h2 class="text-xl mb-4">Personalize with Wallet (Option B)</h2>
                
                <div class="mb-4">
                    <label class="text-sm">Wallet Address</label>
                    <div class="flex gap-2 mt-1">
                        <input id="wallet-input" type="text" placeholder="0x..."
                               class="flex-1 bg-black border border-white/20 px-4 py-2 rounded-2xl text-sm">
                        <button onclick="fetchWalletHoldings()"
                                class="px-6 bg-[#00ff9d] text-black rounded-2xl font-bold">Fetch</button>
                    </div>
                </div>

                <div id="wallet-info" class="mb-4 text-sm hidden">
                    <span class="text-emerald-400">Holds: </span>
                    <span id="wallet-balance" class="font-bold text-2xl"></span> Rocks
                </div>

                <div class="mb-4">
                    <label class="text-sm">Feature Specific Token ID (Optional)</label>
                    <input id="token-id-input" type="number" placeholder="e.g. 4521"
                           class="w-full bg-black border border-white/20 px-4 py-2 rounded-2xl text-sm mt-1"
                           oninput="updateBannerPreview()">
                </div>

                <!-- Textures -->
                <div>
                    <label class="text-sm block mb-2">Choose Background Texture</label>
                    <div class="flex flex-wrap gap-2" id="texture-buttons"></div>
                </div>
            </div>
        </div>

        <!-- Banner Preview -->
        <div class="mt-10">
            <h3 class="mb-3 text-sm tracking-widest">LIVE BANNER PREVIEW (1500×500)</h3>
            <div id="banner-preview" class="x-banner mx-auto rounded-2xl flex flex-col justify-between p-8 text-white"
                 style="background: #1a1a2e; max-width: 100%; transform: scale(0.82); transform-origin: top;">
            </div>
        </div>

        <div class="flex gap-4 mt-6">
            <button onclick="downloadBanner()"
                    class="flex-1 bg-[#00ff9d] text-black py-4 rounded-3xl font-bold">Download PNG</button>
            <button onclick="copyPromptForAI()"
                    class="px-8 border border-white/30 rounded-3xl">Copy AI Prompt</button>
        </div>
    </div>

    <script>
        // ✅ Correct Vercel URL
        const API_BASE = "https://rocks-ruby.vercel.app";

        let currentStats = null;
        let selectedTexture = "moon";
        let currentWallet = null;

        const textures = [
            { id: "moon", name: "Moon Surface", color: "#4a4a4a" },
            { id: "mars", name: "Mars", color: "#b85c38" },
            { id: "earth", name: "Earth", color: "#1e3a5f" },
            { id: "saturn", name: "Saturn", color: "#c5a26f" },
            { id: "jupiter", name: "Jupiter", color: "#b07d3e" },
            { id: "deep", name: "Deep Space", color: "#0a0a1f" }
        ];

        // Fetch Collection Stats
        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/api/rockateral/stats`);
                const json = await res.json();
                currentStats = json.data;
                renderStats();
            } catch (error) {
                console.error("Failed to fetch stats:", error);
            }
        }

        function renderStats() {
            const grid = document.getElementById('stats-grid');
            if (!currentStats) return;

            grid.innerHTML = `
                <div class="stat-pill p-4 rounded-2xl">
                    <div class="text-xs">MAX SUPPLY</div>
                    <div class="text-3xl font-bold">${currentStats.max_supply}</div>
                </div>
                <div class="stat-pill p-4 rounded-2xl">
                    <div class="text-xs text-orange-400">BURNED</div>
                    <div class="text-3xl font-bold">${currentStats.burned}</div>
                </div>
            `;
        }

        // Fetch Wallet Holdings
        async function fetchWalletHoldings() {
            const wallet = document.getElementById('wallet-input').value.trim();
            if (!wallet) return alert("Please enter a wallet address");

            try {
                const res = await fetch(`${API_BASE}/api/rockateral/wallet/${wallet}`);
                const data = await res.json();

                if (data.success) {
                    document.getElementById('wallet-info').classList.remove('hidden');
                    document.getElementById('wallet-balance').innerText = data.rockateral_balance;
                    currentWallet = wallet;
                    updateBannerPreview();
                } else {
                    alert("Error: " + (data.detail || "Failed to fetch wallet"));
                }
            } catch (error) {
                console.error(error);
                alert("Failed to fetch wallet data");
            }
        }

        // Create Texture Buttons
        function createTextureButtons() {
            const container = document.getElementById('texture-buttons');
            container.innerHTML = '';

            textures.forEach(tex => {
                const btn = document.createElement('button');
                btn.className = `texture-btn px-4 py-2 text-sm rounded-2xl border border-white/20`;
                btn.innerText = tex.name;
                btn.onclick = () => {
                    selectedTexture = tex.id;
                    document.querySelectorAll('.texture-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateBannerPreview();
                };
                container.appendChild(btn);
            });
        }

        // Update Banner Preview
        function updateBannerPreview() {
            const banner = document.getElementById('banner-preview');
            const tokenId = document.getElementById('token-id-input').value;
            const walletShort = currentWallet ? currentWallet.slice(0, 6) + '...' + currentWallet.slice(-4) : '';

            let bgColor = "#1a1a2e";
            textures.forEach(t => {
                if (t.id === selectedTexture) bgColor = t.color;
            });

            banner.style.background = bgColor;

            banner.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-5xl font-black tracking-tight">ROCKATERAL</div>
                        ${tokenId ? `<div class="text-2xl mt-1">#${tokenId}</div>` : ''}
                    </div>
                    <div class="text-right text-sm">
                        ${walletShort ? walletShort : ''}
                    </div>
                </div>
            `;
        }

        async function downloadBanner() {
            const banner = document.getElementById('banner-preview');
            const canvas = await html2canvas(banner, { scale: 1.5 });
            const link = document.createElement('a');
            link.download = `rockateral-x-banner.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function copyPromptForAI() {
            alert("AI prompt feature coming soon!");
        }

        function init() {
            fetchStats();
            createTextureButtons();

            // Set default texture
            setTimeout(() => {
                const firstBtn = document.querySelector('.texture-btn');
                if (firstBtn) firstBtn.classList.add('active');
            }, 300);

            // Live update on token ID change
            document.getElementById('token-id-input').addEventListener('input', updateBannerPreview);
        }

        window.onload = init;
    </script>
</body>
</html>
